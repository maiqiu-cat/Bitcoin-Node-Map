server {
    listen 80;
    server_name btcnode.ondream.ai;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/acme;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name btcnode.ondream.ai;

    ssl_certificate /etc/ssl/btcnode.ondream.ai/fullchain.pem;
    ssl_certificate_key /etc/ssl/btcnode.ondream.ai/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:btcnode_ondream_ssl:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security 'max-age=31536000' always;

    root /var/www/btcnode-ondream;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|svg|json|png|jpg|jpeg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }
}
